<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}IrisAI{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <span class="logo-icon">✦</span> IrisAI
    </a>
    <ul class="nav-links">
      <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/predict" class="{% if request.path == '/predict' %}active{% endif %}">Predict</a></li>
      <li><a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a></li>
      <li><a href="/dataset" class="{% if request.path == '/dataset' %}active{% endif %}">Dataset</a></li>
    </ul>
    <button class="hamburger" onclick="toggleNav()">☰</button>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="logo-icon">✦</span>
      <p>IrisAI — Powered by Random Forest · Built with Flask</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
